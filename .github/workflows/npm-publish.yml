name: Publish npm package

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org

      - name: Use npm with OIDC support
        run: |
          npm install -g npm@^11.10.0
          npm --version

      - name: Verify package
        run: |
          npm test
          npm pack --dry-run

      - name: Check npm version availability
        run: |
          NAME="$(node -p "require('./package.json').name")"
          VERSION="$(node -p "require('./package.json').version")"
          if npm view "$NAME@$VERSION" version --json >/tmp/npm-version.json 2>/tmp/npm-version.err; then
            echo "$NAME@$VERSION already exists on npm."
            cat /tmp/npm-version.json
            exit 1
          fi
          if ! grep -q E404 /tmp/npm-version.err; then
            cat /tmp/npm-version.err
            exit 1
          fi

      - name: Publish to npm
        run: npm publish --access public --provenance

      - name: Verify registry install
        run: |
          NAME="$(node -p "require('./package.json').name")"
          VERSION="$(node -p "require('./package.json').version")"
          TMP_PREFIX="$(mktemp -d)"
          npm install --prefix "$TMP_PREFIX" -g "$NAME@$VERSION"
          "$TMP_PREFIX/bin/labcanvas" --version
          "$TMP_PREFIX/bin/app-auto-action" --version
          "$TMP_PREFIX/bin/agenticapp" --version
