<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AppAutoAction</title>
    <link rel="stylesheet" href="/static/app.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="topbar">
        <div>
          <div class="eyebrow">AppAutoAction</div>
          <h1>Paper Figure Studio</h1>
        </div>
        <div class="top-actions">
          <button id="templateBtn" class="ghost">Reset</button>
          <button id="openscadBtn" class="ghost">OpenSCAD</button>
          <button id="figureBtn" class="ghost">Figure Grid</button>
          <button id="renderBtn" class="primary">Render</button>
        </div>
      </section>

      <section class="workspace">
        <aside class="panel chat-panel">
          <header class="panel-head">
            <h2>Chat</h2>
            <span id="chatStatus" class="status">Ready</span>
          </header>
          <div id="messages" class="messages"></div>
          <div class="chips">
            <button data-prompt="Make it a V-SPICE experiment setup">V-SPICE</button>
            <button data-prompt="Generate a 2x3 paper figure grid for optical experiment icons">Figure 2x3</button>
            <button data-prompt="Export this setup to OpenSCAD">OpenSCAD</button>
            <button data-prompt="Use BioRender settings for academic drawings">BioRender</button>
            <button data-prompt="Make it brighter and vivid">Vivid</button>
            <button data-prompt="Add lens">Add lens</button>
            <button data-prompt="Add filter">Add filter</button>
          </div>
          <form id="chatForm" class="composer">
            <textarea id="messageInput" rows="3" placeholder="Ask for a paper setup, optical bench, device concept, labels, colors, or generated figure panels."></textarea>
            <button type="submit">Send</button>
          </form>
        </aside>

        <section class="panel preview-panel">
          <header class="panel-head">
            <h2>Canvas</h2>
            <span id="renderStatus" class="status">Idle</span>
          </header>
          <div class="canvas-toolbar">
            <label>
              Prompt
              <input id="figurePrompt" type="text" value="optical experiment and device setup icons">
            </label>
            <div class="mini-grid">
              <label>
                Rows
                <input id="figureRows" type="number" min="1" max="8" value="2">
              </label>
              <label>
                Cols
                <input id="figureCols" type="number" min="1" max="8" value="3">
              </label>
            </div>
          </div>
          <div class="artifact-canvas">
            <aside id="artifactList" class="artifact-list"></aside>
            <section class="artifact-viewer">
              <div class="artifact-viewer-head">
                <div>
                  <h3 id="artifactTitle">Nothing selected</h3>
                  <p id="artifactMeta" class="status">Generated artifacts appear here.</p>
                </div>
                <span id="artifactKind" class="kind-pill"></span>
              </div>
              <div id="artifactViewer" class="preview-frame">
                <img id="previewImage" alt="Selected artifact preview" hidden>
                <div id="emptyPreview" class="empty-preview">
                  <strong>No artifact yet</strong>
                  <span>Render, export, or generate a figure grid.</span>
                </div>
              </div>
              <div class="artifact-row">
                <a id="pngLink" href="#" hidden>Image</a>
                <a id="blendLink" href="#" hidden>Blend</a>
                <a id="specLink" href="#" hidden>Spec</a>
              </div>
            </section>
          </div>
        </section>

        <aside class="panel spec-panel">
          <header class="panel-head">
            <h2>Scene</h2>
            <span id="specMeta" class="status">0 elements</span>
          </header>
          <div class="scene-summary">
            <label>
              Title
              <input id="titleInput" type="text">
            </label>
            <label>
              Slug
              <input id="slugInput" type="text">
            </label>
          </div>
          <textarea id="specEditor" class="spec-editor" spellcheck="false"></textarea>
          <section class="settings-panel">
            <header class="settings-head">
              <h2>Backends</h2>
              <span id="backendStatus" class="status">Loading</span>
            </header>
            <form id="settingsForm" class="settings-form">
              <label>
                AgInTi command
                <input id="agintiCommand" type="text" autocomplete="off">
              </label>
              <label>
                AgInTi workspace
                <input id="agintiWorkspace" type="text" autocomplete="off">
              </label>
              <div class="mini-grid">
                <label>
                  Provider
                  <input id="agintiProvider" type="text" autocomplete="off">
                </label>
                <label>
                  Model
                  <input id="agintiModel" type="text" autocomplete="off">
                </label>
              </div>
              <label>
                BioRender MCP URL
                <input id="biorenderUrl" type="url" autocomplete="off">
              </label>
              <label>
                BioRender auth env
                <input id="biorenderEnv" type="text" autocomplete="off">
              </label>
              <div class="toggle-row">
                <label><input id="agintiDryRun" type="checkbox"> AgInTi dry run</label>
                <label><input id="toolBioRender" type="checkbox"> BioRender tool</label>
              </div>
              <div class="spec-actions">
                <button id="saveSettingsBtn" class="ghost" type="submit">Save Settings</button>
                <button id="openBioRenderBtn" class="ghost" type="button">Open BioRender</button>
              </div>
            </form>
          </section>
          <div class="spec-actions">
            <button id="applySpecBtn" class="ghost">Apply JSON</button>
            <button id="dryRunBtn" class="ghost">Dry Run</button>
          </div>
        </aside>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
